<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WeaveMind Task</title>
    <meta name="manifest.type" content="page" />
    <!--
      No html/body sizing here. Vite hoists inline <style> from
      multi-entry HTML files into a shared CSS chunk; whichever
      entry's rules win clamps the other entry. The full-tab
      tasks page sets its own html/body/#app rules via
      `:global()` selectors inside App.svelte's component CSS,
      which lands in tasks-*.css (not the shared chunk).
    -->
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>

---
# Cluster-scoped ClusterRoles for the POOLED, trusted, tenant-agnostic
# infra-supervisor and listener (one of each, running in the control-
# plane namespace; see system-namespace.yaml for their SAs). The
# dispatcher creates RoleBindings in each project namespace at register
# time, binding these ClusterRoles to the CONTROL-PLANE SAs
# `weft-infra-supervisor-sa` and `weft-listener-sa`.
#
# This keeps the verb surface to exactly the namespaced kinds the
# supervisor can create (no cluster-scoped write), and the per-project-
# namespace RoleBinding is what grants the control-plane SA access INTO
# each project namespace. A pooled pod is trusted to act for many
# tenants (it runs only our code; every manifest it applies is
# compiled from the typed infra surface in weft-core infra::compile and
# confined to the caller's own namespace by construction), so the
# blast-radius control is the namespaced ClusterRole + per-namespace
# binding, not per-pod tenant identity.
#
# The supervisor owns `kubectl apply` for every resource the
# weft-core compiler can emit (Deployment, StatefulSet, Service,
# PVC, ConfigMap, Secret, Ingress, NetworkPolicy, HPA, Job,
# DaemonSet, Pod). `create + patch + update` covers both fresh
# applies (POST) and Replace's re-apply-after-sweep (PUT/PATCH).
# `delete` covers Stop / Terminate sweeps.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: weft-infra-supervisor-clusterrole
rules:
  # Pods: only listed/watched/deleted (delete-by-label sweep). The
  # supervisor never patches a Pod directly; it scales the
  # parent Deployment / StatefulSet instead.
  - apiGroups: [""]
    resources: [pods]
    verbs: [get, list, watch, delete]
  # Services + Configs + PVCs: created by `kubectl apply`, swept on
  # terminate. Patch is the SSA path kubectl apply uses on existing
  # objects.
  - apiGroups: [""]
    resources: [services, configmaps, secrets, persistentvolumeclaims]
    verbs: [get, list, watch, create, update, patch, delete]
  # Workloads: same as configs PLUS `scale` for the Deployment /
  # StatefulSet replica count moves on Stop / Replace.
  - apiGroups: [apps]
    resources: [deployments, statefulsets, daemonsets]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [apps]
    resources: [deployments/scale, statefulsets/scale]
    verbs: [update, patch]
  - apiGroups: [batch]
    resources: [jobs]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [networking.k8s.io]
    resources: [ingresses, networkpolicies]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [autoscaling]
    resources: [horizontalpodautoscalers]
    verbs: [get, list, watch, create, update, patch, delete]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: weft-listener-clusterrole
rules:
  # Listener needs to resolve Service URLs for cross-namespace SSE
  # subscriptions against infra pods.
  - apiGroups: [""]
    resources: [services, endpoints]
    verbs: [get, list, watch]

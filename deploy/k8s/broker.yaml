---
# weft-broker. The trusted proxy that fronts Postgres for tenant
# pods. Validates each request's projected SA token via TokenReview,
# resolves it to a (tenant, role), and runs a per-endpoint scope
# check before delegating to Postgres.
#
# RBAC posture: TokenReview only, cluster-wide. The broker has no
# pod / service / deployment access. It does NOT mutate cluster
# resources; only kube-apiserver mints SA tokens, the broker just
# verifies them.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: weft-broker-sa
  namespace: weft-db
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: weft-broker-tokenreview
rules:
  - apiGroups: ["authentication.k8s.io"]
    resources: ["tokenreviews"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: weft-broker-tokenreview
subjects:
  - kind: ServiceAccount
    name: weft-broker-sa
    namespace: weft-db
roleRef:
  kind: ClusterRole
  name: weft-broker-tokenreview
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: weft-broker
  namespace: weft-db
  labels:
    app: weft-broker
    weft.dev/role: broker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: weft-broker
  template:
    metadata:
      labels:
        app: weft-broker
        weft.dev/role: broker
    spec:
      serviceAccountName: weft-broker-sa
      containers:
        - name: broker
          image: weft-broker:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9090
              name: http
          # Operator-supplied provider keys (`<PROVIDER>_API_KEY`), packed
          # from the CLI's environment into this Secret on daemon
          # start/restart. Optional: absent until the operator sets one.
          envFrom:
            - secretRef:
                name: weft-provider-keys
                optional: true
          env:
            - name: WEFT_BROKER_PORT
              value: "9090"
            - name: WEFT_BROKER_AUDIENCE
              value: "weft-broker"
            - name: WEFT_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: weft-postgres-credentials
                  key: WEFT_DATABASE_URL
            # Object-store slot: the broker's runtime-file plane (ctx.storage)
            # writes bytes to this bucket. Points at the bundled SeaweedFS in
            # weft-db; substituted from the daemon's template vars (an operator
            # overrides them via env to point at their own S3 endpoint).
            - name: WEFT_OBJECT_STORE_ENDPOINT
              value: "${WEFT_OBJECT_STORE_ENDPOINT}"
            - name: WEFT_OBJECT_STORE_BUCKET
              value: "${WEFT_OBJECT_STORE_BUCKET}"
            - name: WEFT_OBJECT_STORE_REGION
              value: "${WEFT_OBJECT_STORE_REGION}"
            - name: WEFT_OBJECT_STORE_ACCESS_KEY
              value: "${WEFT_OBJECT_STORE_ACCESS_KEY}"
            - name: WEFT_OBJECT_STORE_SECRET_KEY
              value: "${WEFT_OBJECT_STORE_SECRET_KEY}"
            # The browser/host-reachable endpoint presigned DOWNLOAD urls are
            # signed for (the in-cluster I/O endpoint above is unreachable from a
            # browser / the host). Empty = presign against the I/O endpoint (the
            # GCS case, where it is already public).
            - name: WEFT_OBJECT_STORE_PUBLIC_ENDPOINT
              value: "${WEFT_OBJECT_STORE_PUBLIC_ENDPOINT}"
          readinessProbe:
            httpGet:
              path: /health
              port: 9090
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: weft-broker
  namespace: weft-db
  labels:
    app: weft-broker
spec:
  selector:
    app: weft-broker
  ports:
    - name: http
      port: 9090
      targetPort: 9090
---
# Broker ingress: tenant namespaces (anything labeled
# `weft.dev/role=tenant`) may call the broker on :9090. Block
# everything else, including the dispatcher (which goes direct to
# Postgres).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: weft-broker-ingress
  namespace: weft-db
spec:
  podSelector:
    matchLabels:
      app: weft-broker
  policyTypes:
    - Ingress
  ingress:
    # Worker pods reach the broker from two namespace flavors:
    #   - `weft.dev/role=project` (an INFRA project's worker runs in its
    #     own per-project namespace, next to its infra pods)
    #   - `weft.dev/role=shared-workers` (a NO-INFRA project's worker runs
    #     in the single shared worker namespace; that namespace maps to no
    #     tenant, so its workers resolve their tenant per-pod, but they
    #     still call the broker like any worker and must be admitted here)
    # Storage is no longer here: it moved to a pooled pod in the
    # control-plane namespace (admitted by the system rule below).
    - from:
        - namespaceSelector:
            matchExpressions:
              - key: weft.dev/role
                operator: In
                values: [project, shared-workers]
          podSelector:
            matchExpressions:
              - key: weft.dev/role
                operator: In
                values: [worker]
      ports:
        - protocol: TCP
          port: 9090
    # The POOLED listener + infra-supervisor pods are trusted control-plane
    # services: they run in the control-plane namespace (`weft.dev/role=system`),
    # not per tenant, and serve all tenants. Admit them from there. The pod-role
    # filter still constrains WHICH control-plane pods may call:
    #   - listener / infra-supervisor: relay caller tokens for their ops.
    #   - dispatcher: goes direct to Postgres for its OWN data, and fronts the
    #     `weft files` CLI storage surface (it resolves the acting tenant and
    #     proxies each verb to the broker, which owns the bucket + metadata).
    # (There is NO separate `storage` pod role anymore: file downloads are
    # short-lived presigned URLs straight to the object store, so no pod relays
    # bytes or calls a `/storage/authorize` endpoint.)
    - from:
        - namespaceSelector:
            matchLabels:
              weft.dev/role: system
          podSelector:
            matchExpressions:
              - key: weft.dev/role
                operator: In
                values: [listener, infra-supervisor, dispatcher]
      ports:
        - protocol: TCP
          port: 9090
---
# Broker egress: only Postgres (intra-ns), DNS, and kube-apiserver
# (TokenReview). Cannot reach the dispatcher namespace.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: weft-broker-egress
  namespace: weft-db
spec:
  podSelector:
    matchLabels:
      app: weft-broker
  policyTypes:
    - Egress
  egress:
    # Intra-namespace Postgres.
    - to:
        - podSelector:
            matchLabels:
              app: weft-postgres
      ports:
        - protocol: TCP
          port: 5432
    # DNS.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # kube-apiserver (TokenReview).
    #
    # The apiserver doesn't live in a Pod we can pod-select; the only
    # reliable selector is its ClusterIP via ipBlock. We scope to the
    # apiserver's SINGLE ClusterIP /32 (the first address in the
    # Service CIDR; kind: 10.96.0.1), NOT the whole Service CIDR.
    # Scoping to the CIDR would let a compromised broker reach every
    # other ClusterIP Service in the cluster on 443; this rule's whole
    # purpose is that only TokenReview (the apiserver) is reachable.
    # The `weft daemon` apply path substitutes ${WEFT_APISERVER_CLUSTERIP}
    # (derived from the validated Service CIDR's .1) so a non-kind
    # operator with a different CIDR gets the right address.
    - to:
        - ipBlock:
            cidr: ${WEFT_APISERVER_CLUSTERIP}/32
      ports:
        - protocol: TCP
          port: 443
    # Object store (the runtime-file bucket) + any external endpoint the broker
    # legitimately calls. The store is EXTERNAL to the cluster (reached over S3 by
    # its configured endpoint), so the broker reaches OUT to it.
    # The broker is a trusted control-plane component (it holds the bucket creds); a
    # compromised broker is already game-over, so it gets plain internet egress here
    # rather than a hand-maintained per-host allowlist. The cluster-internal CIDRs
    # stay excluded so this doesn't become a lateral-movement path to other pods.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - ${WEFT_CLUSTER_POD_CIDR}
              - ${WEFT_CLUSTER_SERVICE_CIDR}
              - 169.254.0.0/16

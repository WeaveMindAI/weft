apiVersion: v1
kind: Namespace
metadata:
  name: weft-system
  labels:
    weft.dev/role: system
    kubernetes.io/metadata.name: weft-system
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: weft-system-default-deny
  namespace: weft-system
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# Dispatcher ingress. Allowed sources:
#   - public ingress controller (CLI / extension / external webhooks)
#   - intra-namespace (other dispatcher Pods, headless Service)
# Tenant pods CANNOT reach the dispatcher: their NetworkPolicy denies
# egress to weft-system.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: dispatcher-ingress
  namespace: weft-system
spec:
  podSelector:
    matchLabels:
      app: weft-dispatcher
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 9999
    - from:
        - podSelector:
            matchLabels:
              app: weft-dispatcher
      ports:
        - protocol: TCP
          port: 9999
    # Per-tenant storage boxes call the dispatcher's internal
    # grow/shrink endpoints (/internal/storage/.../disks/add|remove).
    # They live in tenant namespaces (weft.dev/role=tenant) with pod
    # role `storage`.
    - from:
        - namespaceSelector:
            matchLabels:
              weft.dev/role: tenant
          podSelector:
            matchLabels:
              weft.dev/role: storage
      ports:
        - protocol: TCP
          port: 9999
---
# Dispatcher egress: god mode. The dispatcher is the control plane:
# it reaches every tenant listener (admin POSTs to /register, /process,
# etc), every tenant infra pod (endpoint resolution, health), every
# external webhook target nodes spec, plus the kube-apiserver via
# kubectl. Any rule that tries to enumerate "what the dispatcher
# talks to" goes stale the moment a node author adds a new outbound
# call from a kind impl on the dispatcher path. So: open egress for
# the dispatcher specifically, lock it down for everything else in
# weft-system via the baseline.
#
# The asymmetry with `dispatcher-ingress` (which IS tightly scoped)
# is deliberate: ingress is the attack surface (anyone can try to
# POST), egress is initiated by trusted code we already control.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: dispatcher-egress
  namespace: weft-system
spec:
  podSelector:
    matchLabels:
      app: weft-dispatcher
  policyTypes:
    - Egress
  egress:
    - {}
---
# ServiceAccounts for the pooled, trusted, tenant-agnostic services
# (infra-supervisor pods; listener pods, both scaled up/down by their
# dispatcher-side pools). They run in the control-plane namespace and
# act across all tenants: the per-project-
# namespace RoleBindings (rendered by project_namespace.rs) bind THESE
# SAs to the listener/supervisor ClusterRoles, giving them the
# namespaced verbs in every project namespace. The broker maps each SA
# name to its trusted role (Listener / InfraSupervisor) via TokenReview.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: weft-listener-sa
  namespace: weft-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: weft-infra-supervisor-sa
  namespace: weft-system
---
# Pooled listener egress: reaches the broker (task enqueue, signal
# rehydrate) and tenant infra pods (SSE subscribes to /events). Like
# the dispatcher it runs trusted code we control, and its outbound set
# (user-configured SSE/poll/socket URLs) can't be enumerated, so egress
# is open; ingress is the controlled surface (dispatcher admin POSTs).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: pooled-listener
  namespace: weft-system
spec:
  podSelector:
    matchLabels:
      weft.dev/role: listener
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: weft-dispatcher
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - {}
---
# Pooled supervisor egress: reaches the kube-apiserver (kubectl apply /
# scale / delete across tenant namespaces), the broker, and tenant
# infra pods (health probes). Trusted control-plane code; open egress,
# no ingress surface (nothing calls into the supervisor).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: pooled-supervisor
  namespace: weft-system
spec:
  podSelector:
    matchLabels:
      weft.dev/role: infra-supervisor
  policyTypes:
    - Ingress
    - Egress
  egress:
    - {}

---
# ServiceAccount for the dispatcher. Lives in `weft-system` (the
# system namespace, kept separate from tenant workloads). The
# binding below grants it cluster-wide read/write on the resources
# it needs to manage in tenant namespaces (workers, listeners,
# infra pods).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: weft-dispatcher
  namespace: weft-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: weft-dispatcher
# Two sources of scope: (1) what the dispatcher's own `kubectl
# apply` / `kubectl delete` paths touch (tenant pods, the listener
# Deployment+Service, tenant namespace bundles: Namespace + SA +
# NetworkPolicy; sweeper `get`s pods), AND (2) the UNION of the
# supervisor + listener ClusterRole verbs, which the dispatcher must
# also hold to pass kube's escalation-prevention check when it
# creates their RoleBindings (see the rule comment below). That's
# why configmaps/secrets/pvc/jobs/ingress/hpa appear here even
# though dispatcher runtime code never calls them directly.
rules:
  # K8s RBAC's escalation-prevention rule: when the dispatcher
  # creates a RoleBinding referencing a ClusterRole, kube-apiserver
  # checks that the dispatcher itself ALREADY HOLDS every verb in
  # that ClusterRole. The supervisor + listener ClusterRoles we
  # bind into project namespaces include `watch` on most resources,
  # `delete` on pods, `patch`/`update` on workload scale, plus
  # `get,list,watch` on endpoints (for the listener's service
  # resolution). The dispatcher needs all of those too, even though
  # its own runtime code doesn't call them, otherwise the RoleBinding
  # apply is rejected.
  - apiGroups: [""]
    resources: [namespaces]
    verbs: [get, list, create, delete]
  - apiGroups: [""]
    resources: [pods]
    verbs: [get, list, watch, create, patch, delete]
  - apiGroups: [""]
    resources: [services]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [""]
    resources: [endpoints]
    verbs: [get, list, watch]
  - apiGroups: [""]
    resources: [serviceaccounts]
    verbs: [get, list, create, update, patch, delete]
  - apiGroups: [""]
    resources: [configmaps, secrets, persistentvolumeclaims]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [apps]
    resources: [deployments, statefulsets, daemonsets]
    verbs: [get, list, watch, create, update, patch, delete]
  # `/scale` subresource: required so the RoleBindings we create
  # (which include this verb in the supervisor's grant) pass k8s's
  # escalation-prevention check at apply time.
  - apiGroups: [apps]
    resources: [deployments/scale, statefulsets/scale]
    verbs: [update, patch]
  - apiGroups: [batch]
    resources: [jobs]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [networking.k8s.io]
    resources: [networkpolicies, ingresses]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [rbac.authorization.k8s.io]
    resources: [rolebindings]
    verbs: [get, list, create, update, patch, delete]
  - apiGroups: [autoscaling]
    resources: [horizontalpodautoscalers]
    verbs: [get, list, watch, create, update, patch, delete]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: weft-dispatcher
subjects:
  - kind: ServiceAccount
    name: weft-dispatcher
    namespace: weft-system
roleRef:
  kind: ClusterRole
  name: weft-dispatcher
  apiGroup: rbac.authorization.k8s.io
---
# StatefulSet for the dispatcher. Stable Pod IDs
# (`weft-dispatcher-0`, `-1`, ...) so each Pod can claim worker /
# task / tenant_listener leases in Postgres with a stable
# `owner_pod_id`.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: weft-dispatcher
  namespace: weft-system
  labels:
    app: weft-dispatcher
    weft.dev/role: dispatcher
spec:
  serviceName: weft-dispatcher-headless
  replicas: 1
  podManagementPolicy: OrderedReady
  selector:
    matchLabels:
      app: weft-dispatcher
  template:
    metadata:
      labels:
        app: weft-dispatcher
        weft.dev/role: dispatcher
    spec:
      serviceAccountName: weft-dispatcher
      terminationGracePeriodSeconds: 60
      containers:
        - name: dispatcher
          image: weft-dispatcher:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9999
              name: http
          env:
            - name: WEFT_POD_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: WEFT_HTTP_PORT
              value: "9999"
            - name: WEFT_CONTROL_PLANE_NAMESPACE
              value: weft-system
            - name: WEFT_LISTENER_IMAGE
              value: weft-listener:local
            - name: WEFT_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: weft-postgres-credentials
                  key: WEFT_DATABASE_URL
            # Cluster CIDR knobs: required in-cluster so the
            # dispatcher can render NetworkPolicies that allow
            # internet egress while denying intra-cluster Pod traffic.
            # Substituted by the `weft daemon` apply path from the
            # WEFT_CLUSTER_{POD,SERVICE}_CIDR env vars (default to
            # Kind's values); a non-kind operator sets those env vars.
            - name: WEFT_CLUSTER_POD_CIDR
              value: "${WEFT_CLUSTER_POD_CIDR}"
            - name: WEFT_CLUSTER_SERVICE_CIDR
              value: "${WEFT_CLUSTER_SERVICE_CIDR}"
            - name: WEFT_BROKER_URL
              value: "http://weft-broker.weft-db.svc.cluster.local:9090"
            # Public base URL surfaced to users in webhook / trigger /
            # activation URLs (<base>/<mount>, <base>/connect/...). This is a
            # CONTROL-PLANE origin: it routes those requests to the dispatcher.
            # File DOWNLOADS do NOT use it: a download is a short-lived presigned
            # URL straight to the object store (see WEFT_OBJECT_STORE_PUBLIC_ENDPOINT
            # below), so the bytes never traverse the dispatcher. The daemon
            # substitutes the local port-forward host here; an operator deploying
            # against a real cluster substitutes the external ingress host. Loopback is allowed in-cluster only
            # when WEFT_LOCAL_DEV is set (see below); production must set a real host.
            - name: WEFT_DISPATCHER_PUBLIC_BASE_URL
              value: "${WEFT_DISPATCHER_PUBLIC_BASE_URL}"
            # The BROWSER-facing object-store origin. The dispatcher serves it at
            # GET /storage/public-base; the webview adds it to its CSP img-src /
            # media-src so an <img>/<video> can load a presigned bucket URL DIRECTLY
            # (bytes come from the store, not through any service). It MUST match the
            # public origin the broker mints presigned download URLs against, or the
            # URL loads but CSP blocks it. Empty when unset -> previews silently
            # blocked, so a deployment that serves media must set it.
            - name: WEFT_OBJECT_STORE_PUBLIC_ENDPOINT
              value: "${WEFT_OBJECT_STORE_PUBLIC_ENDPOINT}"
            # Declares "this is a local kind cluster reached via
            # port-forward", which makes a loopback public base URL
            # legal in-cluster. The daemon sets it to "1" locally;
            # absent in any real deploy, where loopback stays a fatal
            # misconfiguration.
            - name: WEFT_LOCAL_DEV
              value: "${WEFT_LOCAL_DEV}"
            # Projected SA token (audience weft-broker) the dispatcher signs
            # onto its broker storage-admin requests (the `weft files` CLI
            # proxy): the broker resolves this bearer to weft-dispatcher in
            # weft-system, i.e. the control plane. Same token path tenant pods
            # use to reach the broker.
            - name: WEFT_BROKER_TOKEN_PATH
              value: "/var/run/weft/sa/token"
            # Live caller connection handshake: the HMAC the dispatcher
            # signs routing tokens with (same secret every worker pod
            # verifies), and the public gateway origin callers are pointed
            # at (the dispatcher prepends `<pod>.<ns>.` to mint per-pod
            # URLs). Empty disables live connections.
            - name: WEFT_CALLER_TOKEN_SECRET
              value: "${WEFT_CALLER_TOKEN_SECRET}"
            - name: WEFT_GATEWAY_BASE_URL
              value: "${WEFT_GATEWAY_BASE_URL}"
          readinessProbe:
            httpGet:
              path: /health
              port: 9999
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 9999
            initialDelaySeconds: 10
            periodSeconds: 15
          volumeMounts:
            - name: weft-sa-token
              mountPath: /var/run/weft/sa
              readOnly: true
      volumes:
        - name: weft-sa-token
          projected:
            sources:
              - serviceAccountToken:
                  audience: weft-broker
                  expirationSeconds: 3600
                  path: token
---
# Round-robin Service: external clients (CLI, browser extension,
# webhooks) hit this; k8s load-balances across Pods.
apiVersion: v1
kind: Service
metadata:
  name: weft-dispatcher
  namespace: weft-system
  labels:
    app: weft-dispatcher
spec:
  selector:
    app: weft-dispatcher
  ports:
    - name: http
      port: 9999
      targetPort: 9999
---
# Headless Service: gives every Pod a stable DNS name
# (`weft-dispatcher-0.weft-dispatcher-headless.weft-system.svc.cluster.local`).
# The routing layer uses these for Pod-to-Pod forwards.
apiVersion: v1
kind: Service
metadata:
  name: weft-dispatcher-headless
  namespace: weft-system
  labels:
    app: weft-dispatcher
spec:
  clusterIP: None
  selector:
    app: weft-dispatcher
  ports:
    - name: http
      port: 9999
      targetPort: 9999

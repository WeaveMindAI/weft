---
# ServiceAccount for the dispatcher. Lives in `weft-system` (the
# system namespace, kept separate from tenant workloads). The
# binding below grants it cluster-wide read/write on the resources
# it needs to manage in tenant namespaces (workers, listeners,
# sidecars).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: weft-dispatcher
  namespace: weft-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: weft-dispatcher
# Scoped to exactly what dispatcher's `kubectl apply` / `kubectl
# delete` paths touch: tenant pods (workers, sidecars), the
# listener Deployment+Service, tenant namespace bundles
# (Namespace + ServiceAccount + NetworkPolicy). No ConfigMap, Job,
# PVC, Ingress, or read-only diagnostics. Sweeper uses `get` on
# pods to list terminal-phase ones; that's it.
rules:
  - apiGroups: [""]
    resources: [namespaces]
    verbs: [get, list, create]
  - apiGroups: [""]
    resources: [pods]
    verbs: [get, list, watch, create, delete]
  - apiGroups: [""]
    resources: [services]
    verbs: [get, list, create, update, patch, delete]
  - apiGroups: [""]
    resources: [serviceaccounts]
    verbs: [get, list, create, update, patch, delete]
  - apiGroups: [apps]
    resources: [deployments]
    verbs: [get, list, create, update, patch, delete]
  - apiGroups: [networking.k8s.io]
    resources: [networkpolicies]
    verbs: [get, list, create, update, patch, delete]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: weft-dispatcher
subjects:
  - kind: ServiceAccount
    name: weft-dispatcher
    namespace: weft-system
roleRef:
  kind: ClusterRole
  name: weft-dispatcher
  apiGroup: rbac.authorization.k8s.io
---
# StatefulSet for the dispatcher. Stable Pod IDs
# (`weft-dispatcher-0`, `-1`, ...) so each Pod can claim worker /
# task / tenant_listener leases in Postgres with a stable
# `owner_pod_id`.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: weft-dispatcher
  namespace: weft-system
  labels:
    app: weft-dispatcher
    weft.dev/role: dispatcher
spec:
  serviceName: weft-dispatcher-headless
  replicas: 1
  podManagementPolicy: OrderedReady
  selector:
    matchLabels:
      app: weft-dispatcher
  template:
    metadata:
      labels:
        app: weft-dispatcher
        weft.dev/role: dispatcher
    spec:
      serviceAccountName: weft-dispatcher
      terminationGracePeriodSeconds: 60
      containers:
        - name: dispatcher
          image: weft-dispatcher:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9999
              name: http
          env:
            - name: WEFT_POD_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: WEFT_HTTP_PORT
              value: "9999"
            - name: WEFT_SYSTEM_NAMESPACE
              value: weft-system
            - name: WEFT_TENANT_NS_PREFIX
              value: wm-
            - name: WEFT_LISTENER_IMAGE
              value: weft-listener:local
            - name: WEFT_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: weft-postgres-credentials
                  key: WEFT_DATABASE_URL
            # Cluster CIDR knobs: required in-cluster so the
            # dispatcher can render NetworkPolicies that allow
            # internet egress while denying intra-cluster Pod traffic.
            # The default values match Kind's defaults; production
            # operators MUST override.
            - name: WEFT_CLUSTER_POD_CIDR
              value: "10.244.0.0/16"
            - name: WEFT_CLUSTER_SERVICE_CIDR
              value: "10.96.0.0/12"
            - name: WEFT_BROKER_URL
              value: "http://weft-broker.weft-db.svc.cluster.local:9090"
            # Public ingress URL surfaced to users in webhook /
            # activation URLs. Override per-deploy; localhost is the
            # right default for local dev with `kubectl port-forward`
            # but production should set the real ingress host.
            - name: WEFT_DISPATCHER_PUBLIC_BASE_URL
              value: "http://dispatcher.weft.local"
          readinessProbe:
            httpGet:
              path: /health
              port: 9999
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 9999
            initialDelaySeconds: 10
            periodSeconds: 15
---
# Round-robin Service: external clients (CLI, browser extension,
# webhooks) hit this; k8s load-balances across Pods.
apiVersion: v1
kind: Service
metadata:
  name: weft-dispatcher
  namespace: weft-system
  labels:
    app: weft-dispatcher
spec:
  selector:
    app: weft-dispatcher
  ports:
    - name: http
      port: 9999
      targetPort: 9999
---
# Headless Service: gives every Pod a stable DNS name
# (`weft-dispatcher-0.weft-dispatcher-headless.weft-system.svc.cluster.local`).
# The routing layer uses these for Pod-to-Pod forwards.
apiVersion: v1
kind: Service
metadata:
  name: weft-dispatcher-headless
  namespace: weft-system
  labels:
    app: weft-dispatcher
spec:
  clusterIP: None
  selector:
    app: weft-dispatcher
  ports:
    - name: http
      port: 9999
      targetPort: 9999

---
# Dispatcher ingress: routes ALL dispatcher paths (/signal, /signal-token,
# /connect, the public mount paths) to the dispatcher Service. No `host`
# match: the dispatcher mints public URLs at WEFT_DISPATCHER_PUBLIC_BASE_URL (an IP or
# any DNS name pointing at this ingress), so the rule must accept whatever
# Host those URLs carry. A host match here would 404 every minted URL whose
# base isn't that exact name.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: weft-dispatcher
  namespace: weft-system
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: weft-dispatcher
                port:
                  number: 9999

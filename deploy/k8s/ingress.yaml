---
# Dispatcher ingress. Locally this is served by the nginx-ingress
# controller installed into kind; traffic on
# http://dispatcher.weft.local routes to the dispatcher service in
# `weft-system`.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: weft-dispatcher
  namespace: weft-system
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  rules:
    - host: dispatcher.weft.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: weft-dispatcher
                port:
                  number: 9999

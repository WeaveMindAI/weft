[package]
name = "whatsapp"
nodes = ["bridge", "receive", "send"]

[dependencies]
async-trait = "0.1"
reqwest = { version = "0.12", default-features = false, features = ["json", "stream", "rustls-tls"] }
serde_json = "1"
futures-util = "0.3"
tracing = "0.1"
chrono = { version = "0.4", features = ["serde"] }

[package]
name = "openrouter"

# The OpenRouter nodes: one inference call, and a shared parameter block.
# Both speak to OpenRouter specifically (its model slugs, its unified
# pricing catalog, its API key), which is why they are named for it rather
# than for "LLM" in general: another provider needs another key, another
# catalog, and another node.
#
# minillmlib carries the wire dialects and accepts an injected HTTP client
# (`GeneratorInfo::with_http_client`), which is how every call rides
# `ctx.metered_client`; the nodes need no HTTP client and no cost
# bookkeeping of their own.
[dependencies]
async-trait = "0.1"
minillmlib = "0.5.7"
serde_json = "1"
tokio = "1"
